<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7eb6" />
  <meta name="description" content="Las aventuras de Pelu, la gatita blanca: explora, decora, cocina, corre y aprende jugando." />
  <title>Pelu Adventures 🐱</title>

  <!-- PWA / instalación en iPad y celular -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pelu" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="confeti"></div>
  <div id="juego-phaser"></div>

  <!-- Motor de juego (local, sin internet) -->
  <script src="js/lib/phaser.min.js"></script>
  <!-- El orden importa: data → sprite → game → aventuras → plataformas -->
  <script src="js/data.js"></script>
  <script src="js/pelu-sprite.js"></script>
  <script src="js/game.js"></script>
  <script src="js/aventuras.js"></script>
  <script src="js/platformer.js"></script>
  <script src="js/race.js"></script>
  <script src="js/cooking.js"></script>
  <script src="js/fishing.js"></script>
  <script src="js/swim.js"></script>
  <script src="js/escape.js"></script>

  <!-- Registrar el service worker para jugar sin internet (solo si hay soporte) -->
  <script>
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
